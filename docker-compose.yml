version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gfm
      POSTGRES_USER: gfm_app
      POSTGRES_PASSWORD: gfm_local_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gfm_app -d gfm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: "3001"
      DATABASE_URL: postgresql://gfm_app:gfm_local_dev@db:5432/gfm
      REDIS_URL: redis://redis:6379
      JWT_SECRET: gfm-local-dev-secret-change-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  web:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_AGENT_API: http://localhost:8080
    command: sh -c "npm ci && npm run dev"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

  agents:
    build:
      context: ./apps/agents
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      AGENT_SERVER_MODE: "true"
      AGENT_PORT: "8080"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - agents

  pipeline:
    build:
      context: ./apps/pipeline
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://gfm_app:gfm_local_dev@db:5432/gfm
    command: python collectors/master_pipeline.py
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - pipeline

  migrate:
    image: node:20-alpine
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://gfm_app:gfm_local_dev@db:5432/gfm
    command: node DEPLOYMENT/migrate.js
    volumes:
      - ./:/app
      - /app/apps/web/node_modules
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate

volumes:
  pgdata:
