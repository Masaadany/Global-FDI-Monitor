<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0A2540"/>
  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#0d2845" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#0d2845" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#0d2845" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#0d2845" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#0d2845" stroke-width="1"/>
  <!-- Logo -->
  <rect x="80" y="80" width="80" height="80" rx="16" fill="#1D4ED8"/>
  <text x="120" y="145" text-anchor="middle" font-family="Arial Black" font-size="56" font-weight="900" fill="white">G</text>
  <!-- Title -->
  <text x="80" y="260" font-family="Arial Black" font-size="56" font-weight="900" fill="white">Global FDI Monitor</text>
  <text x="80" y="330" font-family="Arial" font-size="28" fill="#94a3b8">World's First Fully Integrated FDI Intelligence Platform</text>
  <!-- Stats -->
  <rect x="80" y="400" width="200" height="100" rx="12" fill="#0d1f35"/>
  <text x="180" y="450" text-anchor="middle" font-family="Arial Black" font-size="40" font-weight="900" fill="white">215</text>
  <text x="180" y="480" text-anchor="middle" font-family="Arial" font-size="16" fill="#94a3b8">Economies</text>
  <rect x="310" y="400" width="200" height="100" rx="12" fill="#0d1f35"/>
  <text x="410" y="450" text-anchor="middle" font-family="Arial Black" font-size="40" font-weight="900" fill="white">50</text>
  <text x="410" y="480" text-anchor="middle" font-family="Arial" font-size="16" fill="#94a3b8">AI Agents</text>
  <rect x="540" y="400" width="200" height="100" rx="12" fill="#0d1f35"/>
  <text x="640" y="450" text-anchor="middle" font-family="Arial Black" font-size="40" font-weight="900" fill="white">14</text>
  <text x="640" y="480" text-anchor="middle" font-family="Arial" font-size="16" fill="#94a3b8">Data Sources</text>
  <rect x="770" y="400" width="200" height="100" rx="12" fill="#0d1f35"/>
  <text x="870" y="450" text-anchor="middle" font-family="Arial Black" font-size="40" font-weight="900" fill="#10b981">2s</text>
  <text x="870" y="480" text-anchor="middle" font-family="Arial" font-size="16" fill="#94a3b8">Live Updates</text>
  <!-- Domain -->
  <text x="1120" y="580" text-anchor="end" font-family="Arial" font-size="20" fill="#475569">fdimonitor.org</text>
