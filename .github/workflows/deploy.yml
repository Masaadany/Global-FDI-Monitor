name: GFM Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: apps/web/package-lock.json }
      - name: Install deps
        run: npm ci
        working-directory: apps/web
      - name: Build static export
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://api.fdimonitor.org
          NEXT_PUBLIC_WS_URL: wss://api.fdimonitor.org/ws
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/web/out
          cname: fdimonitor.org
