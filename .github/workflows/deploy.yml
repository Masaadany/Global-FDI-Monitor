name: GFM Deploy
on:
  push:
    branches: [main]
jobs:
  verify:
    name: Verify docs exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check docs folder
        run: |
          echo "docs/ pages: $(find docs -name 'index.html' | wc -l)"
          echo "docs/ size: $(du -sh docs/ | cut -f1)"
          ls docs/ | head -5
