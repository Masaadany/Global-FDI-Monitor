name: GFM Deploy
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy.yml'
jobs:
  verify:
    name: Verify GitHub Pages docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check docs folder
        run: |
          echo "docs/ pages: $(find docs -name 'index.html' | wc -l)"
          echo "docs/ size: $(du -sh docs/ | cut -f1)"
