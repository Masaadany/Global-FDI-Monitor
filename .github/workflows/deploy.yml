name: GFM CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: melsaadany
  API_IMAGE: gfm-api
  PIPELINE_IMAGE: gfm-pipeline

jobs:
  # ── JOB 1: PYTHON TESTS ────────────────────────────────────────────────
  test-python:
    name: Python Tests (Agents + Pipeline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r apps/pipeline/requirements.txt
      - name: Run agent tests
        run: |
          cd apps
          python -m pytest pipeline/tests/test_agents.py -v --tb=short
      - name: Test pipeline collectors
        run: |
          cd apps/pipeline
          python collectors/master_pipeline.py
      - name: Test enrichment system
        run: |
          cd apps/pipeline
          python enrichment.py

  # ── JOB 2: TYPESCRIPT CHECKS ──────────────────────────────────────────
  test-frontend:
    name: Frontend Build + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: cd apps/web && npm ci
      - name: Build Next.js
        run: cd apps/web && npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: apps/web/out
          retention-days: 1

  # ── JOB 3: API DOCKER BUILD ───────────────────────────────────────────
  build-api:
    name: Build + Push API Docker Image
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest
          cache-to: type=inline

  # ── JOB 4: DEPLOY FRONTEND ────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: [test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install and build
        run: |
          cd apps/web && npm ci && npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/web/out
          cname: fdimonitor.org

  # ── JOB 5: DEPLOY API TO AZURE ────────────────────────────────────────
  deploy-api:
    name: Deploy API to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [build-api]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Update Container App
        run: |
          az containerapp update \
            --name fdi-backend-api \
            --resource-group fdi-monitor-prod \
            --image ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}
      - name: Health check
        run: |
          sleep 15
          STATUS=$(curl -sf ${{ secrets.API_URL }}/api/v1/health | jq -r '.data.status' 2>/dev/null || echo "failed")
          if [ "$STATUS" != "ok" ]; then
            echo "Health check failed: $STATUS"
            exit 1
          fi
          echo "✓ API healthy: $STATUS"

  # ── JOB 6: NOTIFY DEPLOYMENT ──────────────────────────────────────────
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-api]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Deployment status
        run: |
          echo "================================"
          echo "GFM Deployment Summary"
          echo "================================"
          echo "Frontend: ${{ needs.deploy-frontend.result }}"
          echo "API:      ${{ needs.deploy-api.result }}"
          echo "Commit:   ${{ github.sha }}"
          echo "Branch:   ${{ github.ref }}"
          echo "Time:     $(date -u)"
          echo "================================"
