name: GFM Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: melsaadany/gfm-api
  AGENTS_IMAGE: melsaadany/gfm-agents
  AZURE_RG: fdi-monitor-prod
  AZURE_APP: fdi-backend-api

jobs:
  test:
    name: Test Suite (253 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install Python deps
        run: pip install pytest requests pyyaml --break-system-packages 2>/dev/null || pip install pytest requests pyyaml
      - name: Run all tests
        run: python3 -m pytest apps/pipeline/tests/ -v --tb=short --no-header
        working-directory: .

  build-web:
    name: Build Next.js (74 pages)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: apps/web/package-lock.json }
      - name: Install deps
        run: npm ci
        working-directory: apps/web
      - name: Build static export
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://api.fdimonitor.org
          NEXT_PUBLIC_WS_URL: wss://api.fdimonitor.org/ws
          NEXT_PUBLIC_PREVIEW_PASSWORD: ${{ secrets.PREVIEW_PASSWORD }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/out/
          retention-days: 1

  deploy-web:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download build
        uses: actions/download-artifact@v4
        with: { name: web-build, path: out/ }
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          cname: fdimonitor.org

  build-api:
    name: Build API Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

  build-agents:
    name: Build Agents Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push Agents image
        uses: docker/build-push-action@v5
        with:
          context: apps/agents
          push: true
          tags: |
            ${{ env.AGENTS_IMAGE }}:latest
            ${{ env.AGENTS_IMAGE }}:${{ github.sha }}

  deploy-azure:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [build-api, build-agents]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Update API Container App
        run: |
          az containerapp update \
            --name ${{ env.AZURE_APP }} \
            --resource-group ${{ env.AZURE_RG }} \
            --image ${{ env.API_IMAGE }}:${{ github.sha }}
      - name: Update Agents Container App
        run: |
          az containerapp update \
            --name fdi-agents \
            --resource-group ${{ env.AZURE_RG }} \
            --image ${{ env.AGENTS_IMAGE }}:${{ github.sha }} \
            || true
      - name: Run DB migrations
        run: node DEPLOYMENT/migrate.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Health check
        run: |
          sleep 30
          curl -f https://api.fdimonitor.org/api/v1/health || exit 1
        continue-on-error: true

  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-azure]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: https://fdimonitor.org" >> $GITHUB_STEP_SUMMARY
          echo "- API: https://api.fdimonitor.org/api/v1/health" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: 253 passing" >> $GITHUB_STEP_SUMMARY
