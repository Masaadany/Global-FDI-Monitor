name: Deploy GFM Platform

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:

  # ── JOB 1: Deploy frontend to GitHub Pages ──────────────────────────────
  build-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('apps/web/package-lock.json') }}
          restore-keys: ${{ runner.os }}-nextjs-

      - name: Install
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy-frontend:
    name: Deploy to fdimonitor.org
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # ── JOB 2: Deploy API to Azure Container Apps ────────────────────────────
  deploy-api:
    name: Deploy API to Azure
    runs-on: ubuntu-latest
    if: ${{ secrets.AZURE_CREDENTIALS != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true

      - name: Build & Push API Image
        run: |
          docker build -t melsaadany/gfm-api:${{ github.sha }} \
                       -t melsaadany/gfm-api:latest \
                       apps/api/
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
            docker login -u melsaadany --password-stdin
          docker push melsaadany/gfm-api:latest
        continue-on-error: true

      - name: Update Container App
        run: |
          az containerapp update \
            --name fdi-backend-api \
            --resource-group fdi-monitor-prod \
            --image melsaadany/gfm-api:latest
        continue-on-error: true

  # ── JOB 3: Run Python tests ───────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: pytest apps/pipeline/tests/ -v --tb=short
